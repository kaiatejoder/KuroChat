<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#a01a47">
    <meta name="description" content="Aplicación de chat privada y segura">
    <title>Kurochat</title>
    <link rel="icon" href="src/KuroChatDark.svg" type="image/svg+xml">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Pantalla de Login -->
    <div id="loginContainer" class="login-container">
        <div class="login-box">
            <img src="src/KuroChatDark.svg" alt="Kurochat" class="logo">
            <h1>Kurochat</h1>
            <p class="subtitle">Acceso Restringido</p>
            <input
                type="text"
                id="usernameInput"
                placeholder="Nombre de usuario"
                autocomplete="off"
            >
            <input
                type="password"
                id="passwordInput"
                placeholder="Contraseña"
                autocomplete="off"
            >
            <button id="loginBtn">Ingresar</button>
            <p id="attemptCounter" class="attempt-counter">Intentos restantes: 3</p>
            <p id="hint" class="hint" style="display: none;"></p>
        </div>
    </div>

    <!-- Pantalla de Chat -->
    <div id="chatContainer" class="chat-container" style="display: none;">
        <div class="chat-header">
            <div class="header-title">
                <img src="src/KuroChatDark.svg" alt="Kurochat" class="logo-small">
                <h2>Kurochat</h2>
                <span id="currentUserBadge" class="user-badge">Kai</span>
                <div id="onlineStatus" class="online-indicator offline">
                    <span class="online-dot"></span>
                    <span class="online-text">Offline</span>
                </div>
            </div>
            <div class="header-buttons">
                <button id="refreshBtn" class="refresh-btn">🔄</button>
                <button id="downloadLogBtn" class="refresh-btn" title="Descargar log">📥</button>
                <button id="logoutBtn" class="logout-btn">Salir</button>
            </div>
        </div>

        <div id="messagesArea" class="messages-area"></div>

        <div class="input-area">
            <input
                type="text"
                id="messageInput"
                placeholder="Escribe un mensaje..."
                autocomplete="off"
            >
            <button id="sendBtn">Enviar</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
